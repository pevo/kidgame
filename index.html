<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Rescue James</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Rescue James">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1>Rescue James</h1>
          <p>Choose Mark or Maria, stomp Chompers and Ghost Boys, defeat the boss, and rescue James.</p>
        </div>
        <div class="controls">
          <span>Move: A/D or Arrows</span>
          <span>Jump: W, Up, or Space</span>
          <span>Attack: CTRL after Black Sun</span>
          <button class="fullscreen-button" type="button" aria-label="Play fullscreen">⛶</button>
        </div>
      </header>

      <div class="game-frame">
        <canvas id="game" width="960" height="540" aria-label="Rescue James platform game"></canvas>
      </div>
      <footer class="game-footer">
        <span>Rescue James by Leon (with help from Dad)</span>
        <span class="copyright-text">&copy; 2026 Leon. All rights reserved.</span>
      </footer>
    </main>

    <script src="src/main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
