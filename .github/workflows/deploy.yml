name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp commit SHA into app and service worker
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const APP_COMMIT = \"[^\"]*\";/const APP_COMMIT = \"$SHORT_SHA\";/" src/main.js
          sed -i "s/const CACHE = \"[^\"]*\";/const CACHE = \"rescue-james-$SHORT_SHA\";/" sw.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
